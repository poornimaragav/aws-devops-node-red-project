version: '3'

services:
  web: 
    image: nginx
    restart: unless-stopped
  node-red:
  build:
    context: .
    dockerfile: Dockerfile

  container_name: node-red

  ports:
    - "1880:1880"

  volumes:
    - node-red-data:/data

  restart: unless-stopped
  influxdb:
    image: influxdb
    ports:
      - "8086:8086"
  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"

version: '3.8'

services:
  node-red:
    image: nodered/node-red:latest
    environment:
      - NODE_RED_ENABLE_PROJECTS=true
    ports:
      - "1880:1880"
    volumes:
      - node-red-data:/data

volumes:
  node-red-data:
